<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Jin Gaming Panel</title>
<style>
body{
background:#0f0f0f;
color:white;
font-family:sans-serif;
text-align:center;
padding-top:60px;
}

h1{
color:#00ffcc;
}

.btn{
display:block;
width:220px;
margin:15px auto;
padding:15px;
border-radius:12px;
background:#1e1e1e;
border:2px solid #00ffcc;
font-size:18px;
}

.active{
background:#00ffcc;
color:black;
}
</style>
</head>

<body>

<h1>Jin Aim Panel</h1>

<button class="btn" onclick="toggle(this)">AimLock</button>
<button class="btn" onclick="toggle(this)">LockHead</button>
<button class="btn" onclick="toggle(this)">FPS Boost</button>
<button class="btn" onclick="toggle(this)">BootAim</button>

<script>
function toggle(el){
el.classList.toggle("active");
}
</script>

</body>
</html>
